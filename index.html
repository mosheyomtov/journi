<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Journi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   DESIGN TOKENS
═══════════════════════════════ */
:root {
  --bg: #F7F8FA;
  --surface: #FFFFFF;
  --surface-2: #F2F3F7;
  --surface-3: #EAECF2;
  --border: #E8EAF0;
  --border-2: #D8DBE6;

  --ink: #0D0E14;
  --ink-2: #3D3F52;
  --ink-3: #7E8099;
  --ink-4: #BABCCF;

  --brand: #3B6EF5;
  --brand-light: #EEF2FE;
  --brand-dark: #2952CC;

  --green: #22C55E;
  --green-light: #EDFBF3;
  --amber: #F59E0B;
  --amber-light: #FFFBEB;
  --rose: #F43F5E;
  --rose-light: #FFF1F3;
  --violet: #8B5CF6;
  --violet-light: #F5F3FF;

  --sh-sm: 0 1px 3px rgba(13,14,20,0.06), 0 1px 2px rgba(13,14,20,0.04);
  --sh-md: 0 4px 16px rgba(13,14,20,0.08), 0 2px 6px rgba(13,14,20,0.04);
  --sh-lg: 0 16px 48px rgba(13,14,20,0.12), 0 4px 16px rgba(13,14,20,0.06);

  --r-sm: 10px;
  --r: 16px;
  --r-lg: 22px;
  --r-xl: 28px;

  --ease: cubic-bezier(.16,1,.3,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
}

/* ═══════════════════════════════
   RESET & BASE
═══════════════════════════════ */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════
   SCREENS
═══════════════════════════════ */
.screen { display:none; min-height:100vh; flex-direction:column; }
.screen.active { display:flex; animation:fadeUp .4s var(--ease); }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ═══════════════════════════════
   SCREEN: LANDING
═══════════════════════════════ */
#screen-landing {
  background: #fff;
  align-items: stretch;
  position: relative;
  overflow: hidden;
}

.landing-photo-stack {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 55vh;
  background: linear-gradient(160deg, #E8F4F8 0%, #F0EEF8 100%);
}

.photo-card {
  position: absolute;
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--sh-lg);
  background: var(--surface-2);
}
.photo-card img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-card .photo-label {
  position: absolute;
  bottom: 0; left:0; right:0;
  background: linear-gradient(transparent, rgba(0,0,0,0.55));
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 20px 10px 8px;
  text-align: center;
  letter-spacing: 0.3px;
}

/* Stack positioning */
.pc-1 { width:42%; height:200px; top:24px; right:48%; transform:rotate(-8deg); }
.pc-2 { width:46%; height:180px; top:8px; left:48%; transform:rotate(5deg); }
.pc-3 { width:50%; height:220px; top:90px; right:44%; transform:rotate(3deg); }
.pc-4 { width:44%; height:190px; top:80px; left:46%; transform:rotate(-4deg); }
.pc-5 { width:48%; height:175px; top:180px; right:46%; transform:rotate(-2deg); }

/* Journi logo on landing */
.landing-logo-top {
  position: absolute;
  top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-radius: 30px;
  padding: 8px 16px;
  box-shadow: var(--sh-sm);
}
.landing-logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--brand), #6C8FF7);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.landing-logo-text {
  font-size: 17px; font-weight: 800;
  color: var(--ink); letter-spacing: -0.5px;
}

.landing-bottom {
  background: #fff;
  padding: 28px 24px 48px;
  border-radius: 28px 28px 0 0;
  margin-top: -28px;
  position: relative; z-index: 5;
}

.landing-tagline {
  font-size: 28px; font-weight: 800;
  color: var(--ink); line-height: 1.2;
  letter-spacing: -0.8px;
  margin-bottom: 10px;
}
.landing-tagline span { color: var(--brand); }

.landing-desc {
  font-size: 14px; color: var(--ink-3);
  line-height: 1.65; margin-bottom: 28px;
  font-weight: 400;
}

.google-btn {
  width: 100%;
  background: var(--ink);
  color: #fff;
  border: none; border-radius: var(--r);
  padding: 17px 24px;
  font-size: 16px; font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all .2s var(--ease);
  box-shadow: 0 4px 20px rgba(13,14,20,0.25);
  letter-spacing: -0.2px;
}
.google-btn:hover { background: var(--ink-2); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(13,14,20,0.3); }
.google-btn:active { transform: scale(0.98); }
.g-icon { width: 20px; height: 20px; flex-shrink:0; }

.landing-terms { text-align:center; font-size:12px; color:var(--ink-4); margin-top:16px; }
.landing-terms a { color:var(--brand); text-decoration:none; }

/* ═══════════════════════════════
   APP SHELL (sticky header)
═══════════════════════════════ */
.app-bar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
}
.app-bar-logo {
  font-size: 20px; font-weight: 800;
  color: var(--ink); letter-spacing: -0.6px;
}
.app-bar-logo span { color: var(--brand); }

.avatar-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2.5px solid var(--border-2);
  overflow: hidden; cursor: pointer;
  transition: border-color .2s;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--brand), #6C8FF7);
  color: #fff; font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
.avatar-btn:hover { border-color: var(--brand); }
.avatar-btn img { width:100%; height:100%; object-fit:cover; }

/* ═══════════════════════════════
   SCREEN: HOME
═══════════════════════════════ */
#screen-home { background: var(--bg); }
.home-scroll { overflow-y:auto; flex:1; }

/* Greeting */
.home-greeting {
  padding: 24px 20px 20px;
  background: #fff;
  border-bottom: 1px solid var(--border);
}
.greeting-small { font-size: 13px; color: var(--ink-3); font-weight: 500; margin-bottom: 4px; }
.greeting-name { font-size: 26px; font-weight: 800; letter-spacing: -0.7px; color: var(--ink); }
.greeting-sub { font-size: 14px; color: var(--ink-3); margin-top: 4px; }

/* New trip CTA */
.new-trip-cta {
  margin: 20px;
  background: linear-gradient(135deg, var(--brand) 0%, #6C8FF7 100%);
  border-radius: var(--r-lg);
  padding: 22px 20px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(59,110,245,0.28);
  transition: all .25s var(--ease);
  position: relative; overflow: hidden;
}
.new-trip-cta::before {
  content: '';
  position: absolute; top: -40px; left: -40px;
  width: 150px; height: 150px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}
.new-trip-cta:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(59,110,245,0.36); }
.new-trip-cta:active { transform: scale(0.98); }
.ntc-left { position: relative; z-index:1; }
.ntc-title { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: -0.4px; }
.ntc-sub { font-size: 13px; color: rgba(255,255,255,0.72); margin-top: 4px; font-weight: 500; }
.ntc-btn {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 12px;
  width: 46px; height: 46px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  position: relative; z-index:1;
}

/* Section */
.section { padding: 0 20px; margin-bottom: 28px; }
.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title { font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -0.4px; }
.section-count { font-size: 13px; color: var(--ink-3); font-weight: 500; }

/* Trip card */
.trip-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: all .2s var(--ease);
  margin-bottom: 10px;
  box-shadow: var(--sh-sm);
}
.trip-card:hover { border-color: var(--border-2); box-shadow: var(--sh-md); transform: translateY(-1px); }
.trip-card:active { transform: scale(0.99); }

.tc-emoji-wrap {
  width: 54px; height: 54px; border-radius: 14px;
  background: var(--brand-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.tc-body { flex: 1; text-align: right; min-width: 0; }
.tc-name { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; margin-bottom: 5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tc-meta { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.tc-chip {
  font-size: 11px; font-weight: 600; color: var(--ink-3);
  background: var(--surface-2); border-radius: 6px;
  padding: 2px 7px;
}
.tc-shared { background: var(--green-light); color: var(--green); }
.tc-arrow { color: var(--ink-4); font-size: 18px; flex-shrink:0; }

/* Empty state */
.empty-state {
  text-align: center; padding: 52px 24px;
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--r-lg); box-shadow: var(--sh-sm);
}
.empty-icon { font-size: 52px; margin-bottom: 14px; opacity: 0.35; }
.empty-title { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 8px; letter-spacing: -0.3px; }
.empty-desc { font-size: 13px; color: var(--ink-3); line-height: 1.6; }

/* ═══════════════════════════════
   SCREEN: NEW TRIP
═══════════════════════════════ */
#screen-new-trip { background: var(--bg); }

.page-header {
  background: #fff;
  padding: 16px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.back-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px;
}
.back-btn {
  display: flex; align-items: center; gap: 6px;
  font-size: 14px; font-weight: 600; color: var(--ink-3);
  background: none; border: none; cursor: pointer;
  font-family: 'Inter', sans-serif;
  padding: 0; transition: color .15s;
}
.back-btn:hover { color: var(--ink); }
.page-title { font-size: 24px; font-weight: 800; color: var(--ink); letter-spacing: -0.6px; }
.page-sub { font-size: 14px; color: var(--ink-3); margin-top: 4px; }

.form-body { padding: 20px; flex: 1; }

.field { margin-bottom: 18px; }
.field-label {
  display: block; font-size: 12px; font-weight: 700;
  color: var(--ink-3); text-transform: uppercase;
  letter-spacing: 0.6px; margin-bottom: 8px;
}
.field-input, .field-select {
  width: 100%; background: #fff;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 16px; font-size: 15px;
  color: var(--ink); font-family: 'Inter', sans-serif;
  outline: none; transition: all .2s;
  direction: rtl;
}
.field-input:focus, .field-select:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 4px rgba(59,110,245,0.1);
}
.field-input::placeholder { color: var(--ink-4); }
.field-select option { background: #fff; }

.field-textarea {
  width:100%; background:#fff;
  border:1.5px solid var(--border); border-radius:var(--r-sm);
  padding:14px 16px; font-size:15px;
  color:var(--ink); font-family:'Inter',sans-serif;
  outline:none; transition:all .2s; direction:rtl;
  resize:vertical; min-height:80px; line-height:1.6;
}
.field-textarea:focus { border-color:var(--brand); box-shadow:0 0 0 4px rgba(59,110,245,0.1); }
.field-textarea::placeholder { color:var(--ink-4); }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Emoji picker */
.emoji-grid {
  display: grid; grid-template-columns: repeat(6,1fr); gap: 8px;
}
.ep-item {
  aspect-ratio: 1;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: var(--r-sm); font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s var(--ease-spring);
}
.ep-item:active { transform: scale(0.88); }
.ep-item.sel {
  border-color: var(--brand);
  background: var(--brand-light);
  box-shadow: 0 0 0 3px rgba(59,110,245,0.15);
  transform: scale(1.05);
}

/* Primary button */
.btn-primary {
  width: 100%;
  background: var(--ink);
  color: #fff;
  border: none; border-radius: var(--r);
  padding: 17px;
  font-size: 16px; font-weight: 700;
  font-family: 'Inter', sans-serif;
  cursor: pointer; transition: all .2s;
  letter-spacing: -0.2px;
  box-shadow: 0 4px 16px rgba(13,14,20,0.2);
}
.btn-primary:hover { background: var(--ink-2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,14,20,0.25); }
.btn-primary:active { transform: scale(0.98); }

.btn-brand {
  background: var(--brand);
  box-shadow: 0 4px 16px rgba(59,110,245,0.3);
}
.btn-brand:hover { background: var(--brand-dark); box-shadow: 0 8px 24px rgba(59,110,245,0.38); }

.btn-ghost {
  background: var(--surface-2);
  color: var(--ink);
  border: 1.5px solid var(--border);
  box-shadow: none;
}
.btn-ghost:hover { background: var(--surface-3); box-shadow: none; }

.btn-danger {
  background: var(--rose-light);
  color: var(--rose);
  border: 1.5px solid rgba(244,63,94,0.2);
  box-shadow: none;
}
.btn-danger:hover { background: rgba(244,63,94,0.12); box-shadow: none; }

/* ═══════════════════════════════
   SCREEN: TRIP DETAIL
═══════════════════════════════ */
#screen-trip { background: var(--bg); }

.trip-header-section {
  background: #fff;
  padding: 16px 20px 0;
  border-bottom: 1px solid var(--border);
}

.trip-hero-card {
  padding: 0 0 20px;
}
.trip-emoji-lg { font-size: 48px; margin-bottom: 10px; display: block; }
.trip-name-lg {
  font-size: 26px; font-weight: 800;
  color: var(--ink); letter-spacing: -0.7px;
  margin-bottom: 6px; line-height: 1.2;
}
.trip-dest-lg {
  font-size: 14px; color: var(--ink-3); font-weight: 500;
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 4px;
}
.trip-dates-lg { font-size: 13px; color: var(--ink-3); font-weight: 500; }

.trip-quick-actions {
  display: flex; gap: 8px; padding: 14px 0;
}
.qa-btn {
  flex: 1; padding: 11px 12px;
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer; border: 1.5px solid var(--border);
  background: var(--surface-2); color: var(--ink-2);
  transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.qa-btn:active { transform: scale(0.96); }
.qa-btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 4px 12px rgba(59,110,245,0.28); }
.qa-btn.danger { background: var(--rose-light); color: var(--rose); border-color: rgba(244,63,94,0.2); }

/* Tab nav */
.tab-nav {
  display: flex;
  background: #fff;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: 58px; z-index: 100;
}
.tab-nav::-webkit-scrollbar { display:none; }
.tn-btn {
  flex: 1; min-width: 80px;
  padding: 14px 16px;
  font-size: 13.5px; font-weight: 600;
  font-family: 'Inter', sans-serif;
  color: var(--ink-3); background: none;
  border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: all .2s;
  white-space: nowrap;
}
.tn-btn.active { color: var(--brand); border-bottom-color: var(--brand); }
.tn-btn:hover { color: var(--ink-2); }

/* Tab content */
.tab-pane { display:none; padding: 20px; padding-bottom: 100px; }
.tab-pane.active { display:block; animation:fadeUp .3s var(--ease); }

/* Day pills */
.day-pills {
  display: flex; gap: 8px;
  overflow-x: auto; scrollbar-width: none;
  padding-bottom: 4px; margin-bottom: 20px;
}
.day-pills::-webkit-scrollbar { display:none; }
.day-pill {
  flex-shrink: 0;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  cursor: pointer; transition: all .2s var(--ease-spring);
  text-align: center; min-width: 64px;
  font-family: 'Inter', sans-serif;
}
.day-pill:active { transform: scale(0.94); }
.day-pill .dp-num { font-size: 11px; color: var(--ink-4); display:block; font-weight: 600; }
.day-pill .dp-day { font-size: 16px; font-weight: 800; color: var(--ink); display:block; margin: 2px 0; }
.day-pill .dp-lbl { font-size: 9px; color: var(--ink-3); display:block; font-weight: 600; text-transform:uppercase; letter-spacing:0.5px; }
.day-pill.active {
  background: var(--brand); border-color: var(--brand);
  box-shadow: 0 6px 20px rgba(59,110,245,0.28);
  transform: translateY(-2px);
}
.day-pill.active .dp-num,
.day-pill.active .dp-day,
.day-pill.active .dp-lbl { color: #fff; }

/* Timeline */
.timeline { position:relative; padding-right: 26px; }
.timeline::before {
  content:''; position:absolute;
  top:0; bottom:0; right:5px;
  width:2px;
  background: linear-gradient(180deg, var(--brand) 0%, rgba(59,110,245,0.1) 100%);
  border-radius:2px;
}
.tl-item { position:relative; margin-bottom:6px; animation:slideIn .35s var(--ease) backwards; }
@keyframes slideIn { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }

.tl-dot {
  position:absolute; right:-26px; top:18px;
  width:12px; height:12px; border-radius:50%;
  background:#fff; border:2.5px solid var(--brand);
  box-shadow:0 0 0 3px rgba(59,110,245,0.12);
  z-index:2; transition:all .25s;
}
.tl-item:hover .tl-dot { background:var(--brand); transform:scale(1.2); }

.tl-card {
  background:#fff; border:1.5px solid var(--border);
  border-radius:var(--r); padding:14px 16px;
  cursor:pointer; transition:all .2s var(--ease);
  margin-bottom:8px; box-shadow:var(--sh-sm);
}
.tl-card:hover { border-color:var(--border-2); box-shadow:var(--sh-md); transform:translateX(-3px); }
.tl-card.open { border-color:rgba(59,110,245,0.35); box-shadow:0 0 0 4px rgba(59,110,245,0.06),var(--sh-sm); }

.tl-top { display:flex; align-items:center; gap:10px; }
.tl-time {
  font-size:12px; font-weight:700; color:var(--brand);
  min-width:38px; font-variant-numeric:tabular-nums;
  letter-spacing:-0.3px;
}
.tl-emoji { font-size:20px; flex-shrink:0; }
.tl-name { font-size:14px; font-weight:600; color:var(--ink); flex:1; line-height:1.35; letter-spacing:-0.2px; }
.tl-chevron { color:var(--ink-4); font-size:16px; flex-shrink:0; transition:transform .25s; }
.tl-card.open .tl-chevron { transform:rotate(90deg); color:var(--brand); }

.tl-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
.pill {
  font-size:11px; padding:3px 9px; border-radius:20px; font-weight:600;
}
.pill-food { background:var(--green-light); color:var(--green); }
.pill-sight { background:var(--brand-light); color:var(--brand); }
.pill-sleep { background:var(--violet-light); color:var(--violet); }
.pill-shop { background:var(--rose-light); color:var(--rose); }
.pill-night { background:var(--amber-light); color:var(--amber); }
.pill-move { background:var(--surface-2); color:var(--ink-3); }

.tl-body {
  display:none; margin-top:13px; padding-top:13px;
  border-top:1px solid var(--border);
  animation:expandIn .25s var(--ease);
}
.tl-body.show { display:block; }
@keyframes expandIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

.tl-desc { font-size:13.5px; color:var(--ink-2); line-height:1.7; margin-bottom:10px; }
