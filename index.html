<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Journi - Test</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2fa;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
}
.box {
  background: white;
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  max-width: 320px;
  width: 90%;
}
.logo { font-size: 48px; margin-bottom: 16px; }
h1 { color: #3B6EF5; font-size: 28px; margin-bottom: 8px; }
p { color: #666; font-size: 16px; margin-bottom: 24px; }
.btn {
  background: #3B6EF5;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px 28px;
  font-size: 16px;
  cursor: pointer;
  width: 100%;
}
.status {
  margin-top: 16px;
  font-size: 14px;
  color: #22C55E;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="box">
  <div class="logo">✈️</div>
  <h1>Journi</h1>
  <p>האפליקציה עובדת!</p>
  <button class="btn" onclick="test()">לחץ לבדיקה</button>
  <div class="status" id="status"></div>
</div>
<script>
function test() {
  document.getElementById('status').textContent = '✓ JavaScript עובד מצוין!';
}
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('status').textContent = '✓ הדף נטען בהצלחה';
});
</script>
</body>
</html>
